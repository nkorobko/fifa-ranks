<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIFA Ranks{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Custom styles -->
    <style>
        /* Trophy colors for top 3 */
        .rank-1 { color: #FFD700; } /* Gold */
        .rank-2 { color: #C0C0C0; } /* Silver */
        .rank-3 { color: #CD7F32; } /* Bronze */
        
        /* Smooth transitions */
        * {
            transition: all 0.2s ease;
        }
        
        /* HTMX loading indicator */
        .htmx-request .loading {
            display: inline-block;
        }
        .loading {
            display: none;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-3xl">⚽</span>
                    <h1 class="text-2xl font-bold">FIFA Ranks</h1>
                </div>
                <nav class="hidden md:flex space-x-6">
                    <a href="/" class="hover:text-blue-200 font-medium">Home</a>
                    <a href="/rankings" class="hover:text-blue-200 font-medium">Rankings</a>
                    <a href="/matches" class="hover:text-blue-200 font-medium">Matches</a>
                    <a href="/players" class="hover:text-blue-200 font-medium">Players</a>
                </nav>
                <!-- Mobile menu button -->
                <button class="md:hidden text-white" onclick="toggleMobileMenu()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            <!-- Mobile menu -->
            <nav id="mobile-menu" class="hidden md:hidden mt-4 space-y-2">
                <a href="/" class="block hover:text-blue-200 font-medium">Home</a>
                <a href="/rankings" class="block hover:text-blue-200 font-medium">Rankings</a>
                <a href="/matches" class="block hover:text-blue-200 font-medium">Matches</a>
                <a href="/players" class="block hover:text-blue-200 font-medium">Players</a>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 mt-16">
        <div class="container mx-auto px-4 py-6 text-center">
            <p class="text-sm">
                Powered by TrueSkill algorithm • 
                <a href="https://t.me/your_bot" class="text-blue-400 hover:text-blue-300">Telegram Bot</a> • 
                <a href="/api/docs" class="text-blue-400 hover:text-blue-300">API Docs</a>
            </p>
        </div>
    </footer>

    <!-- Mobile menu toggle script -->
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
