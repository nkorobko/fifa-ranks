<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple/Pink gradient background matching EA FC -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg-gradient)"/>
  
  <!-- EA FC Logo (angular design) -->
  <g transform="translate(8, 12)">
    <!-- Left triangle/arrow -->
    <polygon points="0,8 12,20 0,32 6,32 18,20 6,8" fill="white"/>
    
    <!-- F shape -->
    <rect x="20" y="8" width="14" height="4" fill="white"/>
    <rect x="20" y="8" width="4" height="24" fill="white"/>
    <rect x="20" y="18" width="12" height="4" fill="white"/>
    
    <!-- Right C shape -->
    <path d="M 36,8 L 48,8 L 48,12 L 40,12 L 40,28 L 48,28 L 48,32 L 36,32 Z" fill="white"/>
  </g>
</svg>
